<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Last War 攻略AI — 管理者画面</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg:#0e0e1a; --bg2:#17172a; --bg3:#1f1f38;
  --border:rgba(200,169,110,0.18); --border2:rgba(200,169,110,0.35);
  --gold:#c8a96e; --gold-dim:#9a7e4f;
  --text:#e8e4db; --text2:#a09880; --text3:#6a6358;
  --danger:#c84a4a; --success:#4caf7d; --info:#3a6bc8;
  --radius:10px; --radius-lg:14px;
}
body { font-family:-apple-system,'Helvetica Neue',sans-serif; background:var(--bg); color:var(--text); min-height:100dvh; display:flex; flex-direction:column; }

.header { display:flex; align-items:center; justify-content:space-between; padding:10px 16px; border-bottom:0.5px solid var(--border); background:var(--bg2); flex-shrink:0; position:sticky; top:0; z-index:10; }
.header-left { display:flex; align-items:center; gap:10px; }
.logo { width:36px; height:36px; border-radius:var(--radius); background:var(--bg3); border:0.5px solid var(--border2); display:flex; align-items:center; justify-content:center; font-size:18px; }
.app-title { font-size:15px; font-weight:600; color:var(--gold); }
.badge { font-size:11px; background:rgba(200,169,110,0.15); color:var(--gold-dim); border:0.5px solid var(--border2); border-radius:20px; padding:2px 10px; margin-left:6px; }
.app-sub { font-size:11px; color:var(--text3); margin-top:1px; display:flex; align-items:center; }
.status-dot { width:8px; height:8px; border-radius:50%; display:inline-block; margin-right:5px; }
.status-dot.ok { background:var(--success); } .status-dot.err { background:var(--danger); } .status-dot.off { background:var(--text3); }
.back-btn { font-size:13px; color:var(--text2); background:none; border:0.5px solid var(--border); padding:6px 14px; border-radius:var(--radius); cursor:pointer; text-decoration:none; display:inline-flex; align-items:center; gap:6px; }
.back-btn:hover { border-color:var(--border2); color:var(--text); }

/* lock */
#lock-screen { flex:1; display:flex; align-items:center; justify-content:center; }
.lock-card { background:var(--bg2); border:0.5px solid var(--border2); border-radius:var(--radius-lg); padding:32px; width:min(400px,90vw); text-align:center; }
.lock-icon { font-size:40px; margin-bottom:16px; }
.lock-title { font-size:18px; font-weight:600; color:var(--gold); margin-bottom:8px; }
.lock-sub { font-size:13px; color:var(--text2); margin-bottom:24px; line-height:1.6; }
.lock-card input { width:100%; background:var(--bg3); border:0.5px solid var(--border2); color:var(--text); border-radius:var(--radius); padding:12px 16px; font-size:15px; font-family:inherit; letter-spacing:.1em; margin-bottom:12px; }
.lock-card input:focus { outline:none; border-color:var(--gold-dim); }
.lock-err { font-size:13px; color:var(--danger); min-height:18px; margin-bottom:12px; }
.btn-primary { width:100%; padding:12px; border-radius:var(--radius); background:var(--gold); color:var(--bg); border:none; font-size:14px; font-weight:600; cursor:pointer; }
.btn-primary:hover { opacity:.85; }

/* main */
#main-screen { flex:1; display:none; flex-direction:column; overflow:hidden; }
.content { flex:1; overflow-y:auto; padding:20px 16px; display:flex; flex-direction:column; gap:28px; max-width:760px; width:100%; margin:0 auto; }
.content::-webkit-scrollbar { width:4px; }
.content::-webkit-scrollbar-thumb { background:var(--border2); border-radius:4px; }

.section-title { font-size:12px; font-weight:600; color:var(--gold-dim); letter-spacing:.06em; text-transform:uppercase; margin-bottom:12px; display:flex; align-items:center; gap:8px; }

/* GAS設定 */
.gas-row { display:flex; gap:8px; }
.gas-row input { flex:1; background:var(--bg3); border:0.5px solid var(--border); color:var(--text); border-radius:var(--radius); padding:10px 14px; font-size:13px; font-family:inherit; }
.gas-row input:focus { outline:none; border-color:var(--border2); }
.gas-row input::placeholder { color:var(--text3); }

/* クロールパネル */
.crawl-panel { background:var(--bg2); border:0.5px solid var(--border2); border-radius:var(--radius-lg); padding:18px; display:flex; flex-direction:column; gap:14px; }
.crawl-site { display:flex; align-items:center; gap:10px; padding:10px 14px; background:var(--bg3); border:0.5px solid var(--border); border-radius:var(--radius); }
.crawl-site-icon { font-size:20px; }
.crawl-site-info { flex:1; }
.crawl-site-name { font-size:14px; font-weight:500; color:var(--text); }
.crawl-site-url { font-size:11px; color:var(--text3); margin-top:2px; }

.progress-bar-wrap { background:var(--bg3); border-radius:20px; height:8px; overflow:hidden; }
.progress-bar { height:100%; background:var(--gold); border-radius:20px; transition:width .4s ease; width:0%; }

.crawl-stats { display:grid; grid-template-columns:repeat(4,1fr); gap:8px; }
.stat-card { background:var(--bg3); border:0.5px solid var(--border); border-radius:var(--radius); padding:10px; text-align:center; }
.stat-num { font-size:20px; font-weight:600; color:var(--text); }
.stat-label { font-size:11px; color:var(--text3); margin-top:2px; }
.stat-card.s-done .stat-num { color:var(--success); }
.stat-card.s-pending .stat-num { color:var(--gold); }
.stat-card.s-error .stat-num { color:var(--danger); }

.crawl-btns { display:flex; gap:8px; flex-wrap:wrap; }
.btn { padding:9px 18px; border-radius:var(--radius); border:0.5px solid var(--border2); font-size:13px; cursor:pointer; font-family:inherit; transition:opacity .15s; }
.btn:hover { opacity:.8; }
.btn:disabled { opacity:.35; cursor:not-allowed; }
.btn-gold { background:var(--gold); color:var(--bg); border-color:var(--gold); font-weight:600; }
.btn-ghost { background:transparent; color:var(--text2); }
.btn-danger { background:transparent; color:var(--danger); border-color:var(--danger); }

.crawl-log { background:var(--bg3); border-radius:var(--radius); padding:10px 12px; font-size:12px; color:var(--text2); min-height:40px; line-height:1.7; max-height:120px; overflow-y:auto; }

/* chips */
.chips { display:flex; flex-wrap:wrap; gap:6px; margin-bottom:10px; }
.chip { display:inline-flex; align-items:center; gap:6px; background:var(--bg3); border:0.5px solid var(--border2); border-radius:20px; padding:4px 12px; font-size:12px; color:var(--text2); }
.chip button { background:none; border:none; color:var(--text3); cursor:pointer; font-size:15px; line-height:1; padding:0; }
.chip button:hover { color:var(--danger); }

.row { display:flex; gap:8px; }
.row input, .form-input { flex:1; background:var(--bg3); border:0.5px solid var(--border); color:var(--text); border-radius:var(--radius); padding:9px 12px; font-size:13px; font-family:inherit; }
.row input:focus, .form-input:focus { outline:none; border-color:var(--border2); }
.row input::placeholder, .form-input::placeholder { color:var(--text3); }
.add-btn { padding:9px 16px; border-radius:var(--radius); background:var(--bg3); color:var(--gold); border:0.5px solid var(--border2); font-size:13px; cursor:pointer; white-space:nowrap; }
.add-btn:hover { background:var(--bg2); }

.kb-card { background:var(--bg3); border:0.5px solid var(--border); border-radius:var(--radius-lg); padding:12px 14px; display:flex; gap:10px; align-items:flex-start; margin-bottom:8px; }
.kb-card:hover { border-color:var(--border2); }
.kb-card-body { flex:1; min-width:0; }
.kb-card-title { font-size:14px; font-weight:500; color:var(--text); margin-bottom:4px; }
.kb-card-preview { font-size:12px; color:var(--text2); line-height:1.5; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.kb-card-meta { font-size:11px; color:var(--text3); margin-top:6px; display:flex; align-items:center; gap:6px; }
.tag-pill { font-size:10px; padding:2px 8px; border-radius:20px; background:rgba(200,169,110,0.12); color:var(--gold-dim); border:0.5px solid var(--border2); }
.del-btn { background:none; border:none; color:var(--text3); cursor:pointer; font-size:18px; padding:2px; flex-shrink:0; }
.del-btn:hover { color:var(--danger); }

.form-area { display:flex; flex-direction:column; gap:8px; border:0.5px solid var(--border); border-radius:var(--radius-lg); padding:14px; background:var(--bg2); }
.form-area textarea { background:var(--bg3); border:0.5px solid var(--border); color:var(--text); border-radius:var(--radius); padding:10px 12px; font-size:13px; resize:vertical; min-height:100px; line-height:1.5; font-family:inherit; }
.form-area textarea:focus { outline:none; border-color:var(--border2); }
.form-area textarea::placeholder { color:var(--text3); }

.empty { text-align:center; padding:20px; color:var(--text3); font-size:13px; border:0.5px dashed var(--border2); border-radius:var(--radius); }
.kb-count { font-size:12px; color:var(--text3); margin-left:auto; }

.toast { position:fixed; bottom:24px; left:50%; transform:translateX(-50%); background:var(--bg3); border:0.5px solid var(--success); color:var(--success); padding:10px 20px; border-radius:var(--radius); font-size:13px; opacity:0; transition:opacity .3s; pointer-events:none; z-index:100; white-space:nowrap; }
.toast.show { opacity:1; }
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <div class="logo">⚔️</div>
    <div>
      <div class="app-title">Last War 攻略AI <span class="badge">管理者</span></div>
      <div class="app-sub">
        <span class="status-dot off" id="status-dot"></span>
        <span id="status-text">未接続</span>
      </div>
    </div>
  </div>
  <a href="index.html" class="back-btn">← チャット画面へ</a>
</div>

<!-- ロック画面 -->
<div id="lock-screen">
  <div class="lock-card">
    <div class="lock-icon">🔒</div>
    <div class="lock-title">管理者ログイン</div>
    <div class="lock-sub">パスワードを入力してください</div>
    <input type="password" id="pw-input" placeholder="パスワード"
      onkeydown="if(event.key==='Enter')checkPassword()" />
    <div class="lock-err" id="pw-err"></div>
    <button class="btn-primary" onclick="checkPassword()">ログイン</button>
  </div>
</div>

<!-- 管理メイン -->
<div id="main-screen">
  <div class="content">

    <!-- GAS URL -->
    <div>
      <div class="section-title">⚙️ GAS URL 設定</div>
      <div class="gas-row">
        <input id="gas-input" type="url" placeholder="https://script.google.com/macros/s/.../exec" />
        <button class="btn btn-gold" onclick="saveGasUrl()">保存・接続</button>
      </div>
    </div>

    <!-- Gemini APIキー -->
    <div>
      <div class="section-title">🤖 Gemini API キー設定</div>
      <div class="gas-row">
        <input id="gemini-key-input" type="password" placeholder="AIzaSy..." autocomplete="off" />
        <button class="btn btn-gold" onclick="saveGeminiKey()">保存</button>
      </div>
      <div style="font-size:12px;color:var(--text3);margin-top:8px;" id="gemini-key-status">ステータス確認中...</div>
    </div>

    <!-- クロール -->
    <div>
      <div class="section-title">🌐 サイト自動クロール</div>
      <div class="crawl-panel">
        <!-- クロール対象サイト一覧 -->
        <div id="crawl-site-list"></div>
        <!-- サイト追加フォーム -->
        <div style="display:flex;gap:8px;flex-wrap:wrap;">
          <input id="cs-name"    class="form-input" placeholder="サイト名（例：ゲームエイト）" style="flex:1;min-width:140px;" />
          <input id="cs-url"     class="form-input" placeholder="URL（例：https://game8.jp/lastwar-survival）" style="flex:2;min-width:200px;" />
          <button class="add-btn" onclick="addCrawlSite()">追加</button>
        </div>

        <div>
          <div style="display:flex;justify-content:space-between;font-size:12px;color:var(--text3);margin-bottom:6px;">
            <span id="progress-label">待機中</span>
            <span id="progress-pct">—</span>
          </div>
          <div class="progress-bar-wrap">
            <div class="progress-bar" id="progress-bar"></div>
          </div>
        </div>

        <div class="crawl-stats">
          <div class="stat-card"><div class="stat-num" id="stat-total">—</div><div class="stat-label">合計</div></div>
          <div class="stat-card s-done"><div class="stat-num" id="stat-done">—</div><div class="stat-label">完了</div></div>
          <div class="stat-card s-pending"><div class="stat-num" id="stat-pending">—</div><div class="stat-label">残り</div></div>
          <div class="stat-card s-error"><div class="stat-num" id="stat-error">—</div><div class="stat-label">エラー</div></div>
        </div>

        <div class="crawl-log" id="crawl-log">クロールを開始するとここにログが表示されます</div>

        <div class="crawl-btns">
          <button class="btn btn-gold" id="btn-start" onclick="startCrawl()">🚀 クロール開始</button>
          <button class="btn btn-ghost" id="btn-continue" onclick="continueAuto()" disabled>▶ 続きを実行</button>
          <button class="btn btn-danger" id="btn-clear" onclick="clearCrawl()">🗑 データをクリア</button>
        </div>
      </div>
    </div>

    <!-- 信頼ドメイン -->
    <div>
      <div class="section-title">✅ 信頼ドメイン</div>
      <div class="chips" id="url-chips"></div>
      <div class="row">
        <input id="url-input" placeholder="例: lastwar.fandom.com"
          onkeydown="if(event.key==='Enter')addUrl()" />
        <button class="add-btn" onclick="addUrl()">追加</button>
      </div>
    </div>

    <!-- 手動メモ -->
    <div>
      <div class="section-title">
        📋 手動メモ / Discordテキスト
        <span class="kb-count" id="kb-count"></span>
      </div>
      <div id="kb-list"></div>
      <div class="form-area" style="margin-top:10px">
        <input class="form-input" id="kb-title" placeholder="タイトル（例：砂漠の戦場 基本戦略）" />
        <input class="form-input" id="kb-tag"   placeholder="タグ（例：砂漠,部隊編成）" />
        <textarea id="kb-text" placeholder="Discordからコピペしたテキストやメモをここに貼り付けてください..."></textarea>
        <div class="row">
          <button class="add-btn" onclick="addKb()" style="margin-left:auto">登録する</button>
        </div>
      </div>
    </div>

  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const ADMIN_PASSWORD = 'bxd720';
const DEFAULT_URLS = ['game8.jp','lastwar.fandom.com','lastwar.wiki.gg'];
let gasUrl = localStorage.getItem('lw_gas_url') || '';
let trustedUrls = [], kbEntries = [], isOnline = false;
let crawling = false;

// ---- ログイン -----------------------------------------------
function checkPassword() {
  const pw = document.getElementById('pw-input').value;
  if (pw === ADMIN_PASSWORD) {
    sessionStorage.setItem('lw_admin','1');
    document.getElementById('lock-screen').style.display = 'none';
    document.getElementById('main-screen').style.display = 'flex';
    document.getElementById('gas-input').value = gasUrl;
    if (gasUrl) loadAll();
  } else {
    document.getElementById('pw-err').textContent = 'パスワードが違います';
    document.getElementById('pw-input').value = '';
  }
}
if (sessionStorage.getItem('lw_admin') === '1') {
  document.getElementById('lock-screen').style.display = 'none';
  document.getElementById('main-screen').style.display = 'flex';
  document.getElementById('gas-input').value = gasUrl;
  if (gasUrl) loadAll();
}

// ---- GAS通信 ------------------------------------------------
async function gasGet(params) {
  const res = await fetch(gasUrl + '?' + new URLSearchParams(params));
  return res.json();
}
let crawlSites = [];

async function loadAll() {
  try {
    const [u, k, s] = await Promise.all([
      gasGet({action:'getUrls'}),
      gasGet({action:'getKb'}),
      gasGet({action:'getCrawlSites'})
    ]);
    trustedUrls = u.ok && u.data.length ? u.data : [...DEFAULT_URLS];
    kbEntries   = k.ok ? k.data : [];
    crawlSites  = s.ok ? s.data : [];
    setStatus(true);
  } catch(e) { setStatus(false); }
  renderAll();
  refreshCrawlStatus();
  checkGeminiKey();
}
function setStatus(ok) {
  isOnline = ok;
  document.getElementById('status-dot').className   = 'status-dot ' + (ok?'ok':'err');
  document.getElementById('status-text').textContent = ok ? 'GAS接続中' : '未接続';
}
async function saveGasUrl() {
  const val = document.getElementById('gas-input').value.trim();
  if (!val) return;
  gasUrl = val; localStorage.setItem('lw_gas_url', gasUrl);
  await loadAll();
  toast('接続しました');
}

async function saveGeminiKey() {
  const key = document.getElementById('gemini-key-input').value.trim();
  if (!key) { alert('APIキーを入力してください'); return; }
  if (!isOnline) { alert('先にGAS URLを設定・接続してください'); return; }
  const r = await gasGet({action:'setConfig', key:'GEMINI_API_KEY', value:key}).catch(()=>null);
  if (r?.ok) {
    document.getElementById('gemini-key-input').value = '';
    document.getElementById('gemini-key-status').textContent = '✅ APIキー設定済み';
    document.getElementById('gemini-key-status').style.color = 'var(--success)';
    toast('Gemini APIキーを保存しました');
  } else {
    toast('保存に失敗しました');
  }
}

async function checkGeminiKey() {
  if (!isOnline) return;
  try {
    const r = await gasGet({action:'getConfig', key:'GEMINI_API_KEY'});
    const el = document.getElementById('gemini-key-status');
    if (r?.exists) {
      el.textContent = '✅ APIキー設定済み';
      el.style.color = 'var(--success)';
    } else {
      el.textContent = '⚠️ APIキー未設定 — チャットが動きません';
      el.style.color = 'var(--danger)';
    }
  } catch(e) {}
}

// ---- クロール -----------------------------------------------
async function startCrawl() {
  if (!isOnline) { alert('先にGAS URLを設定・接続してください'); return; }
  if (!confirm('game8.jpのラストウォー攻略ページを自動収集します。\n既存のgame8データは上書きされます。開始しますか？')) return;

  setLog('🔍 リンクを収集中...');
  document.getElementById('btn-start').disabled = true;
  document.getElementById('btn-continue').disabled = true;

  try {
    const r = await gasGet({action:'startCrawl'});
    if (!r.ok) { setLog('❌ エラー: ' + r.error); document.getElementById('btn-start').disabled = false; return; }
    setLog(`✅ ${r.total}件のURLを発見。取得を開始します...`);
    await refreshCrawlStatus();
    await runBatch();
  } catch(e) {
    setLog('❌ ' + e.message);
    document.getElementById('btn-start').disabled = false;
  }
}

async function runBatch() {
  crawling = true;
  document.getElementById('btn-continue').disabled = true;

  while (crawling) {
    try {
      const r = await gasGet({action:'crawlNext', batch:'5'});
      if (!r.ok) { setLog('❌ ' + r.error); break; }

      addLog(`📄 ${r.processed}件取得 (エラー:${r.errors}) — 残り${r.remaining}件`);
      await refreshCrawlStatus();

      if (r.done || r.remaining === 0) {
        setLog('🎉 クロール完了！知識ベースに登録されました。');
        await loadAll();
        break;
      }
      await new Promise(res => setTimeout(res, 500));
    } catch(e) {
      setLog('❌ ' + e.message);
      break;
    }
  }

  crawling = false;
  document.getElementById('btn-start').disabled = false;
  document.getElementById('btn-continue').disabled = false;
}

async function continueAuto() { await runBatch(); }

async function clearCrawl() {
  if (!confirm('クロールで取得したgame8データをすべて削除しますか？')) return;
  const r = await gasGet({action:'clearCrawl'}).catch(()=>null);
  if (r?.ok) {
    toast(`${r.deleted}件削除しました`);
    await loadAll();
    resetProgress();
    setLog('クロールデータをクリアしました');
  }
}

async function refreshCrawlStatus() {
  try {
    const s = await gasGet({action:'getCrawlStatus'});
    if (!s.ok || s.total === 0) return;
    document.getElementById('stat-total').textContent   = s.total;
    document.getElementById('stat-done').textContent    = s.done;
    document.getElementById('stat-pending').textContent = s.pending;
    document.getElementById('stat-error').textContent   = s.error;
    const pct = Math.round((s.done + s.skip) / s.total * 100);
    document.getElementById('progress-bar').style.width = pct + '%';
    document.getElementById('progress-pct').textContent = pct + '%';
    document.getElementById('progress-label').textContent =
      s.pending > 0 ? `取得中... (${s.done}/${s.total})` : '完了';
  } catch(e) {}
}

function resetProgress() {
  ['stat-total','stat-done','stat-pending','stat-error'].forEach(id => document.getElementById(id).textContent = '—');
  document.getElementById('progress-bar').style.width = '0%';
  document.getElementById('progress-pct').textContent = '—';
  document.getElementById('progress-label').textContent = '待機中';
}

let logLines = [];
function setLog(msg) { logLines = [msg]; renderLog(); }
function addLog(msg) { logLines.push(msg); if (logLines.length > 8) logLines.shift(); renderLog(); }
function renderLog() {
  const el = document.getElementById('crawl-log');
  el.textContent = logLines.join('\n');
  el.scrollTop = el.scrollHeight;
}

// ---- 描画 ---------------------------------------------------
function renderAll() { renderUrls(); renderKb(); renderCrawlSites(); }

function renderUrls() {
  const chips = document.getElementById('url-chips');
  chips.innerHTML = trustedUrls.map(u =>
    `<span class="chip">${esc(u)}<button onclick="removeUrl('${esc(u)}')" title="削除">×</button></span>`
  ).join('') || '<span style="font-size:13px;color:var(--text3)">登録なし</span>';
}

function renderKb() {
  // 手動メモのみ表示（game8クロール分は件数だけ表示）
  const manual = kbEntries.filter(e => e.tag !== 'game8');
  const crawled = kbEntries.filter(e => e.tag === 'game8');

  document.getElementById('kb-count').textContent =
    `手動 ${manual.length}件 / game8クロール ${crawled.length}件`;

  const list = document.getElementById('kb-list');
  if (manual.length === 0) {
    list.innerHTML = '<div class="empty">手動メモはまだ登録されていません</div>'; return;
  }
  list.innerHTML = manual.map(e => `
    <div class="kb-card">
      <div class="kb-card-body">
        <div class="kb-card-title">${esc(e.title)}</div>
        <div class="kb-card-preview">${esc(e.text.slice(0,120))}${e.text.length>120?'…':''}</div>
        <div class="kb-card-meta">
          ${esc(e.date||'')}
          ${e.tag?`<span class="tag-pill">${esc(e.tag)}</span>`:''}
        </div>
      </div>
      <button class="del-btn" onclick="removeKb('${esc(e.id)}')" title="削除">🗑</button>
    </div>`).join('');
}

// ---- URL CRUD -----------------------------------------------
async function addUrl() {
  const raw = document.getElementById('url-input').value.trim().replace(/^https?:\/\//,'');
  if (!raw || trustedUrls.includes(raw)) return;
  if (isOnline) await gasGet({action:'addUrl', url:raw}).catch(()=>{});
  document.getElementById('url-input').value = '';
  await loadAll(); toast('追加しました');
}
async function removeUrl(url) {
  if (!confirm(`"${url}" を削除しますか？`)) return;
  if (isOnline) await gasGet({action:'deleteUrl', url}).catch(()=>{});
  await loadAll(); toast('削除しました');
}

// ---- KB手動 CRUD --------------------------------------------
async function addKb() {
  const title = document.getElementById('kb-title').value.trim();
  const text  = document.getElementById('kb-text').value.trim();
  const tag   = document.getElementById('kb-tag').value.trim();
  if (!text) { alert('テキストを入力してください'); return; }
  if (isOnline) {
    const r = await gasGet({action:'addKb', title:title||'無題', text, tag}).catch(()=>null);
    if (r?.ok) await loadAll();
  }
  document.getElementById('kb-title').value = '';
  document.getElementById('kb-tag').value   = '';
  document.getElementById('kb-text').value  = '';
  toast('登録しました');
}
async function removeKb(id) {
  if (!confirm('削除しますか？')) return;
  if (isOnline) await gasGet({action:'deleteKb', id}).catch(()=>{});
  await loadAll(); toast('削除しました');
}

// ---- ユーティリティ -----------------------------------------
function renderCrawlSites() {
  const el = document.getElementById('crawl-site-list');
  if (!el) return;
  if (crawlSites.length === 0) {
    el.innerHTML = '<div class="empty" style="margin-bottom:8px">クロール対象サイトが登録されていません</div>';
    return;
  }
  el.innerHTML = crawlSites.map(s => `
    <div class="crawl-site-item">
      <div style="font-size:20px">📖</div>
      <div class="crawl-site-info">
        <div class="crawl-site-name">${esc(s.name)}</div>
        <div class="crawl-site-url">${esc(s.url)}</div>
      </div>
      <button class="del-btn" onclick="deleteCrawlSite('${esc(s.id)}')" title="削除">🗑</button>
    </div>`).join('');
}

async function addCrawlSite() {
  const name = document.getElementById('cs-name').value.trim();
  const url  = document.getElementById('cs-url').value.trim();
  if (!url) { alert('URLを入力してください'); return; }
  if (!isOnline) { alert('先にGAS URLを設定・接続してください'); return; }
  const r = await gasGet({action:'addCrawlSite', name: name||url, url}).catch(()=>null);
  if (r?.ok) {
    document.getElementById('cs-name').value = '';
    document.getElementById('cs-url').value  = '';
    await loadAll();
    toast('クロール対象サイトを追加しました');
  }
}

async function deleteCrawlSite(id) {
  if (!confirm('このサイトをクロール対象から削除しますか？')) return;
  await gasGet({action:'deleteCrawlSite', id}).catch(()=>{});
  await loadAll();
  toast('削除しました');
}

function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = '✅ ' + msg; el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'), 2500);
}
function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
</script>
