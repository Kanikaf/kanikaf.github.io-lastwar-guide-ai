<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Last War 攻略AI — BxD Alliance</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg:#0e0e1a; --bg2:#17172a; --bg3:#1f1f38;
  --border:rgba(200,169,110,0.18); --border2:rgba(200,169,110,0.35);
  --gold:#c8a96e; --text:#e8e4db; --text2:#a09880; --text3:#6a6358;
  --accent:#3a6bc8; --danger:#c84a4a;
  --radius:10px; --radius-lg:14px;
}
body { font-family:-apple-system,'Helvetica Neue',sans-serif; background:var(--bg); color:var(--text); height:100dvh; display:flex; flex-direction:column; overflow:hidden; }
.header { display:flex; align-items:center; justify-content:space-between; padding:10px 16px; border-bottom:0.5px solid var(--border); background:var(--bg2); flex-shrink:0; }
.header-left { display:flex; align-items:center; gap:10px; }
.logo { width:36px; height:36px; border-radius:var(--radius); background:var(--bg3); border:0.5px solid var(--border2); display:flex; align-items:center; justify-content:center; font-size:18px; }
.app-title { font-size:15px; font-weight:600; color:var(--gold); letter-spacing:.02em; }
.app-sub { font-size:11px; color:var(--text3); margin-top:1px; }
.status-dot { width:8px; height:8px; border-radius:50%; display:inline-block; margin-right:5px; }
.status-dot.ok { background:#4caf7d; } .status-dot.err { background:var(--danger); } .status-dot.off { background:var(--text3); }
#view-chat { flex:1; display:flex; flex-direction:column; overflow:hidden; }
.chat-messages { flex:1; overflow-y:auto; padding:16px; display:flex; flex-direction:column; gap:14px; scroll-behavior:smooth; }
.chat-messages::-webkit-scrollbar { width:4px; }
.chat-messages::-webkit-scrollbar-thumb { background:var(--border2); border-radius:4px; }
.msg { display:flex; gap:10px; max-width:88%; animation:fadeUp .2s ease; }
.msg.user { align-self:flex-end; flex-direction:row-reverse; }
@keyframes fadeUp { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }
.avatar { width:30px; height:30px; border-radius:50%; flex-shrink:0; display:flex; align-items:center; justify-content:center; font-size:14px; border:0.5px solid var(--border); }
.avatar.ai { background:var(--bg3); } .avatar.user { background:var(--accent); border-color:transparent; }
.bubble { padding:10px 14px; border-radius:var(--radius-lg); font-size:14px; line-height:1.65; border:0.5px solid var(--border); background:var(--bg2); color:var(--text); white-space:pre-wrap; word-break:break-word; }
.msg.user .bubble { background:var(--bg3); border-color:var(--border2); }
.source-tag { font-size:11px; color:var(--text3); margin-top:4px; padding-left:40px; }
.input-row { display:flex; gap:8px; align-items:flex-end; padding:10px 16px; border-top:0.5px solid var(--border); background:var(--bg2); flex-shrink:0; }
.input-row textarea { flex:1; background:var(--bg3); border:0.5px solid var(--border); color:var(--text); border-radius:var(--radius-lg); padding:10px 14px; font-size:14px; resize:none; min-height:44px; max-height:120px; line-height:1.5; font-family:inherit; transition:border-color .15s; }
.input-row textarea:focus { outline:none; border-color:var(--border2); }
.input-row textarea::placeholder { color:var(--text3); }
.send-btn { width:44px; height:44px; border-radius:var(--radius-lg); border:none; background:var(--gold); color:var(--bg); cursor:pointer; display:flex; align-items:center; justify-content:center; font-size:18px; flex-shrink:0; transition:opacity .15s; }
.send-btn:hover { opacity:.85; } .send-btn:disabled { opacity:.35; cursor:not-allowed; }
.typing-dots { display:flex; gap:4px; align-items:center; padding:4px 0; }
.dot { width:6px; height:6px; border-radius:50%; background:var(--text3); animation:blink 1.2s infinite; }
.dot:nth-child(2){animation-delay:.2s} .dot:nth-child(3){animation-delay:.4s}
@keyframes blink{0%,80%,100%{opacity:.3}40%{opacity:1}}
</style>
</head>
<body>
<div class="header">
  <div class="header-left">
    <div class="logo">⚔️</div>
    <div>
      <div class="app-title">Last War 攻略AI</div>
      <div class="app-sub">
        <span class="status-dot off" id="status-dot"></span>
        <span id="status-text">接続中...</span>
      </div>
    </div>
  </div>
</div>

<div id="view-chat">
  <div class="chat-messages" id="chat-messages">
    <div class="msg">
      <div class="avatar ai">⚔️</div>
      <div>
        <div class="bubble">こんにちは！Last War 攻略AIです。<br><br>📌 信頼ソース（公式Wiki・連盟メモ・Discordテキスト）のみを根拠に回答します。<br>SNSや掲示板などの未確認情報は使用しません。<br><br>何でも聞いてください！</div>
      </div>
    </div>
  </div>
  <div class="input-row">
    <textarea id="user-input" placeholder="攻略について質問する... (Shift+Enterで改行)" rows="1"
      oninput="autoResize(this)"
      onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMsg();}"></textarea>
    <button class="send-btn" id="send-btn" onclick="sendMsg()" title="送信">➤</button>
  </div>
</div>

<script>
const DEFAULT_URLS = ['lastwar.fandom.com','lastwar.wiki.gg'];
let gasUrl      = localStorage.getItem('lw_gas_url') || '';
let trustedUrls = [];
let kbEntries   = [];
let chatHistory = [];

(async function init() {
  if (!gasUrl) { setStatus(false); return; }
  await loadFromGas();
})();

async function gasGet(params) {
  const res = await fetch(gasUrl + '?' + new URLSearchParams(params));
  return res.json();
}

async function loadFromGas() {
  try {
    const [u, k] = await Promise.all([gasGet({action:'getUrls'}), gasGet({action:'getKb'})]);
    trustedUrls = u.ok && u.data.length ? u.data : [...DEFAULT_URLS];
    kbEntries   = k.ok ? k.data : [];
    setStatus(true);
  } catch(e) {
    trustedUrls = [...DEFAULT_URLS];
    kbEntries   = [];
    setStatus(false);
  }
}

function setStatus(ok) {
  document.getElementById('status-dot').className   = 'status-dot ' + (ok ? 'ok' : 'err');
  document.getElementById('status-text').textContent = ok ? 'GAS接続中' : '未接続（管理者に連絡）';
}

function appendMsg(role, text, source) {
  const area = document.getElementById('chat-messages');
  const isUser = role === 'user';
  const div = document.createElement('div');
  div.className = 'msg' + (isUser ? ' user' : '');
  div.innerHTML = `
    <div class="avatar ${isUser?'user':'ai'}">${isUser?'👤':'⚔️'}</div>
    <div>
      <div class="bubble">${esc(text)}</div>
      ${source ? `<div class="source-tag">📎 ${esc(source)}</div>` : ''}
    </div>`;
  area.appendChild(div);
  area.scrollTop = area.scrollHeight;
}

function showTyping() {
  const area = document.getElementById('chat-messages');
  const div = document.createElement('div');
  div.className = 'msg'; div.id = 'typing';
  div.innerHTML = `<div class="avatar ai">⚔️</div><div class="bubble"><div class="typing-dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div></div>`;
  area.appendChild(div);
  area.scrollTop = area.scrollHeight;
}
function removeTyping() { document.getElementById('typing')?.remove(); }

async function sendMsg() {
  const input = document.getElementById('user-input');
  const q = input.value.trim();
  if (!q) return;
  input.value = ''; input.style.height = 'auto';
  document.getElementById('send-btn').disabled = true;
  appendMsg('user', q);
  chatHistory.push({role:'user', content:q});
  showTyping();

  try {
    // GAS経由でGemini APIを呼び出す
    const params = new URLSearchParams({
      action: 'chat',
      message: q,
      history: JSON.stringify(chatHistory.slice(0, -1)) // 直前のユーザーメッセージを除いた履歴
    });
    const res  = await fetch(gasUrl + '?' + params);
    const data = await res.json();

    if (!data.ok) {
      removeTyping();
      appendMsg('ai', '❌ ' + (data.error || 'エラーが発生しました'));
      chatHistory.pop();
    } else {
      removeTyping();
      appendMsg('ai', data.reply, 'game8.jp / 知識ベース');
      chatHistory.push({role:'assistant', content:data.reply});
    }
  } catch(err) {
    removeTyping();
    appendMsg('ai', 'エラー: ' + err.message);
    chatHistory.pop();
  }
  document.getElementById('send-btn').disabled = false;
}

function autoResize(el) { el.style.height='auto'; el.style.height=Math.min(el.scrollHeight,120)+'px'; }
function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
</script>
</body>
</html>
